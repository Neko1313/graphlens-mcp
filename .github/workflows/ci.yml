name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    # A hung test (e.g. a stalled aiosqlite worker) must fail the job fast, not burn
    # the whole runner budget. pytest-timeout caps individual tests; this caps the job.
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        # graphlens requires Python >= 3.13. Add "3.14" once its wheels are available.
        python-version: ["3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --all-groups

      - name: Lint (ruff)
        run: uv run ruff check src tests

      - name: Format check (ruff)
        run: uv run ruff format --check src tests

      - name: Type check (ty)
        run: uv run ty check

      - name: Security scan (bandit)
        run: uv run bandit -c pyproject.toml -r src

      - name: Tests (pytest)
        run: uv run pytest --cov=src --cov-report=term-missing
