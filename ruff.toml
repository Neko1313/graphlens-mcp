# Lint config aligned with the graphlens engine (Neko1313/graphlens ruff.toml):
# a curated `select` rather than ALL-with-ignores, line-length 79, autofix on.
line-length = 79
target-version = "py313"
fix = true
unsafe-fixes = true

[lint]
ignore = [
    "D203",
    "D212",
    "S101",
    "RUF002",
    "ANN401",
    "RUF001",
    "RUF003",
    "S603",
    "RUF012",
]
select = [
    "A",
    "B",
    "F",
    "I",
    "Q",
    "ASYNC",
    "N",
    "W",
    "UP",
    "T20",
    "SIM",
    "ANN",
    "PL",
    "PT",
    "RET",
    "E",
    "S",
    "C4",
    "EM",
    "DTZ",
    "RUF",
    "TCH",
    "ARG",
    "DOC",
    "D",
]

[lint.pylint]
# CLI commands map each option to a parameter, and the per-file DB write carries a
# file's full metadata; allow up to 7 args before PLR0913 fires (rule stays active).
max-args = 7

[lint.per-file-ignores]
"tests/**" = [
    "ANN",
    "D",
    "PLR",
    "ARG",
    "E501",
    "S",
    "N",
    "PLC",
    "PT",
    "SIM",
]
