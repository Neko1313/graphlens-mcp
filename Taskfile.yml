version: "3"

# Developer task runner for graphlens-mcp. Install go-task: https://taskfile.dev
# Run `task` (or `task --list`) to see available tasks; `task check` runs everything.

vars:
  SRC: src
  TESTS: tests

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list
    silent: true

  install:
    desc: Sync the virtualenv with all dependency groups
    cmds:
      - uv sync --all-groups

  lint:
    desc: Lint with ruff (curated ruleset in ruff.toml)
    cmds:
      - uv run ruff check {{.SRC}} {{.TESTS}}

  format:
    desc: Format with ruff
    cmds:
      - uv run ruff format {{.SRC}} {{.TESTS}}

  format-check:
    desc: Verify formatting without writing changes
    cmds:
      - uv run ruff format --check {{.SRC}} {{.TESTS}}

  fix:
    desc: Auto-fix lint issues and format
    cmds:
      - uv run ruff check --fix {{.SRC}} {{.TESTS}}
      - uv run ruff format {{.SRC}} {{.TESTS}}

  typecheck:
    desc: Type-check with ty
    cmds:
      - uv run ty check {{.SRC}}

  security:
    desc: Security scan with bandit
    cmds:
      - uv run bandit -c pyproject.toml -r {{.SRC}}

  test:
    desc: Run the test suite with coverage
    cmds:
      - uv run pytest --cov=src --cov-report=term-missing

  check:
    desc: Run lint, format-check, typecheck, security and tests (CI gate)
    cmds:
      - task: lint
      - task: format-check
      - task: typecheck
      - task: security
      - task: test

  # ---------------------------------------------------------------------------
  # Docs site (Docusaurus, under website/; needs Node + pnpm)
  # ---------------------------------------------------------------------------

  docs:install:
    desc: Install the docs site dependencies
    dir: website
    cmds:
      - pnpm install --frozen-lockfile

  docs:serve:
    desc: Preview the docs site locally with hot reload
    dir: website
    cmds:
      - pnpm start

  docs:build:
    desc: Build the static docs site
    dir: website
    cmds:
      - pnpm build

  # ---------------------------------------------------------------------------
  # Release (ported from the graphlens engine; single-package). Driven by the
  # Release workflow; conventional commits decide the next version via git-cliff.
  # ---------------------------------------------------------------------------

  release:version:
    desc: Determine next version via conventional commits
    cmds:
      - |
        NEXT=$(git cliff --bumped-version 2>/dev/null || echo "")
        if [[ -z "$NEXT" ]]; then
          echo "No previous tag found, bootstrapping with v0.1.0"
          NEXT="v0.1.0"
        fi
        NEXT_CLEAN="${NEXT#v}"
        echo "Next version: $NEXT ($NEXT_CLEAN)"
        if [[ -n "${GITHUB_OUTPUT:-}" ]]; then
          echo "tag=$NEXT" >> "$GITHUB_OUTPUT"
          echo "version=$NEXT_CLEAN" >> "$GITHUB_OUTPUT"
        fi

  release:bump:
    desc: Bump the package version (requires VERSION=x.y.z)
    requires:
      vars: [VERSION]
    cmds:
      - uv version {{.VERSION}} --frozen
      - uv lock

  release:changelog:
    desc: Generate CHANGELOG.md (requires TAG=vX.Y.Z)
    requires:
      vars: [TAG]
    cmds:
      - git cliff --tag {{.TAG}} --output CHANGELOG.md

  release:commit:
    desc: Commit version bump and changelog, create annotated tag (requires TAG=vX.Y.Z)
    requires:
      vars: [TAG]
    cmds:
      - |
        git add pyproject.toml uv.lock CHANGELOG.md
        git commit -m "chore(release): {{.TAG}}"
        git tag -a "{{.TAG}}" -m "Release {{.TAG}}"

  release:push:
    desc: Push commit and tag to origin (requires TAG=vX.Y.Z)
    requires:
      vars: [TAG]
    cmds:
      - git push origin main
      - git push origin {{.TAG}}

  release:publish:
    desc: Build and publish the package to PyPI
    cmds:
      - rm -rf dist
      - uv build
      - uv publish

  release:github:
    desc: Create a GitHub Release with changelog notes (requires TAG=vX.Y.Z)
    requires:
      vars: [TAG]
    cmds:
      - |
        git cliff --latest --strip all > /tmp/release-notes.md
        gh release create {{.TAG}} \
          --title {{.TAG}} \
          --notes-file /tmp/release-notes.md
