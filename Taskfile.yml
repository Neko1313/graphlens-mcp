version: "3"

# Developer task runner for graphlens-mcp. Install go-task: https://taskfile.dev
# Run `task` (or `task --list`) to see available tasks; `task check` runs everything.

vars:
  SRC: src
  TESTS: tests

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list
    silent: true

  install:
    desc: Sync the virtualenv with all dependency groups + the semantic extra
    # The semantic extra is included so the dev/CI environment type-checks and
    # tests the optional semantic layer (semble + scikit-learn). The package
    # itself still ships it as an opt-in extra; this only affects tooling.
    cmds:
      - uv sync --all-groups --extra semantic

  lint:
    desc: Lint with ruff (curated ruleset in ruff.toml)
    cmds:
      - uv run ruff check {{.SRC}} {{.TESTS}}

  format:
    desc: Format with ruff
    cmds:
      - uv run ruff format {{.SRC}} {{.TESTS}}

  format-check:
    desc: Verify formatting without writing changes
    cmds:
      - uv run ruff format --check {{.SRC}} {{.TESTS}}

  fix:
    desc: Auto-fix lint issues and format
    cmds:
      - uv run ruff check --fix {{.SRC}} {{.TESTS}}
      - uv run ruff format {{.SRC}} {{.TESTS}}

  typecheck:
    desc: Type-check with ty
    cmds:
      - uv run ty check {{.SRC}}

  security:
    desc: Security scan with bandit
    cmds:
      - uv run bandit -c pyproject.toml -r {{.SRC}}

  test:
    desc: Run the test suite with coverage
    # Keep the embedding model off the network: the semantic tests drive the
    # real code paths with a monkeypatched model and assert the offline-degrade
    # behavior, so a CI run must never try to download potion-code-16M (which
    # would be slow and flaky). Tests that need a live model are skipped.
    env:
      HF_HUB_OFFLINE: "1"
    cmds:
      - uv run pytest --cov=src --cov-report=term-missing

  check:
    desc: Run lint, format-check, typecheck, security and tests (CI gate)
    cmds:
      - task: lint
      - task: format-check
      - task: typecheck
      - task: security
      - task: test

  # ---------------------------------------------------------------------------
  # Docs site (Docusaurus, under website/; needs Node + pnpm)
  # ---------------------------------------------------------------------------

  docs:install:
    desc: Install the docs site dependencies
    dir: website
    cmds:
      - pnpm install --frozen-lockfile

  docs:serve:
    desc: Preview the docs site locally with hot reload
    dir: website
    cmds:
      - pnpm start

  docs:build:
    desc: Build the static docs site
    dir: website
    cmds:
      - pnpm build

  # ---------------------------------------------------------------------------
  # Release (ported from the graphlens engine; single-package). Driven by the
  # Release workflow; conventional commits decide the next version via git-cliff.
  # ---------------------------------------------------------------------------

  release:version:
    desc: Determine next version via conventional commits
    cmds:
      - |
        NEXT=$(git cliff --bumped-version 2>/dev/null || echo "")
        if [[ -z "$NEXT" ]]; then
          echo "No previous tag found, bootstrapping with v0.1.0"
          NEXT="v0.1.0"
        fi
        NEXT_CLEAN="${NEXT#v}"
        echo "Next version: $NEXT ($NEXT_CLEAN)"
        if [[ -n "${GITHUB_OUTPUT:-}" ]]; then
          echo "tag=$NEXT" >> "$GITHUB_OUTPUT"
          echo "version=$NEXT_CLEAN" >> "$GITHUB_OUTPUT"
        fi

  release:bump:
    desc: Bump the package version (requires VERSION=x.y.z)
    requires:
      vars: [VERSION]
    cmds:
      - uv version {{.VERSION}} --frozen
      - uv lock
      # server.json has no native bump tool, so keep its version (and the pinned
      # PyPI package version it advertises) in lockstep with pyproject via jq.
      - |
        tmp=$(mktemp)
        jq --arg v "{{.VERSION}}" '.version = $v | .packages[0].version = $v' server.json > "$tmp"
        mv "$tmp" server.json

  release:changelog:
    desc: Generate CHANGELOG.md (requires TAG=vX.Y.Z)
    requires:
      vars: [TAG]
    cmds:
      - git cliff --tag {{.TAG}} --output CHANGELOG.md

  release:commit:
    desc: Commit version bump and changelog, create annotated tag (requires TAG=vX.Y.Z)
    requires:
      vars: [TAG]
    cmds:
      - |
        git add pyproject.toml uv.lock CHANGELOG.md server.json
        git commit -m "chore(release): {{.TAG}}"
        git tag -a "{{.TAG}}" -m "Release {{.TAG}}"

  release:push:
    desc: Push commit and tag to origin (requires TAG=vX.Y.Z)
    requires:
      vars: [TAG]
    cmds:
      - git push origin main
      - git push origin {{.TAG}}

  release:publish:
    desc: Build and publish the package to PyPI
    cmds:
      - rm -rf dist
      - uv build
      - uv publish

  release:registry:
    desc: Publish server.json metadata to the official MCP registry (CI uses GitHub OIDC)
    cmds:
      # The registry only stores metadata; the package itself must already be on
      # PyPI (release:publish) so its README — carrying the mcp-name marker — can
      # be fetched to prove ownership of the io.github.neko1313/* namespace.
      - |
        curl -fsSL \
          "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" \
          | tar -xz -C /tmp mcp-publisher
        /tmp/mcp-publisher login github-oidc
        /tmp/mcp-publisher publish

  release:github:
    desc: Create a GitHub Release with changelog notes (requires TAG=vX.Y.Z)
    requires:
      vars: [TAG]
    cmds:
      - |
        git cliff --latest --strip all > /tmp/release-notes.md
        gh release create {{.TAG}} \
          --title {{.TAG}} \
          --notes-file /tmp/release-notes.md
